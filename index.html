<html>

<head>

	<script>

		// Variaveis Globais 
		var senhaUsuario = 3589 //Senha
		var saldo = 100.5; //Float
		var extratoLista = []; //Array

		function apresentacao() {
			
			var nome = prompt('Qual o seu nome?');
			alert ('Olá ' + nome + ', é um prazer ter você por aqui!');

			inicio();
		}

		function inicio() {
			senha();
			var escolha = parseInt(prompt('Selecione uma opção 1.) Saldo 2.) Extrato 3.) Saque 4.) Depósito 5.) Transferência 6.) Sair'));

			switch (escolha) {
				case 1:
					ver_saldo();
					break;
				case 2:
					fazer_extrato();
					break;
				case 3: 
					fazer_saque();
					break;
				case 4:
					fazer_deposito();
					break;
				case 5:
					fazer_transferencia();
					break;
				case 6:
					sair();
				
			}
			}

		function ver_saldo() {
			senha();
			alert('Seu saldo atual é: ' + saldo);
			inicio();
		}

		function fazer_deposito() {
			senha();
			var deposito = parseFloat(prompt('Qual o valor para depósito?'));

			// Not a Number
			if (isNaN(deposito) || deposito === '' || deposito <= 0) {
				alert('Operação não autorizada (Informe um número ou um valor maior que zero):');
				fazer_deposito();
			} else {
				saldo += deposito;
				extratoLista.push("Depósito: R$ " + deposito.toFixed(2));

				alert("Depósito de R$ " + deposito + " realizado com sucesso!");
				ver_saldo();
			}
		}

		function fazer_saque() {
			senha();
			var saque = parseFloat(prompt('Qual o valor para saque?'));
			
			while (saque > saldo) {
				alert('Operação não autorizada.');
				break;
			}

			if (isNaN(saque) || saque === '' || saque >= 0) {
				alert('Operação não autorizada (Informe um número ou um valor maior que zero)');
				fazer_saque();
			} else {
				saldo -= saque;

				extratoLista.push("Saque: R$ " + saque.toFixed(2));

				alert("Saque de R$ " + saque + " realizado!");
				ver_saldo();
			}
		}

		function fazer_extrato() {
			senha();
			var extrato = prompt('Deseja imprimir o extrato? (S/N)');
			if (extrato.toUpperCase() === 'S') {
				alert('Extrato Imprimido:\n' + extratoLista.join('\n'));

				inicio();

			} else if (extrato.toUpperCase() === 'N') {

				inicio();

			} else {
				alert('Por favor, informe S ou N');

				fazer_extrato();
			}
		}

		function fazer_transferencia() {
			senha();

			var numTransfer = parseFloat(prompt('Qual a CHAVE para transferência: '));
			var saldoDisponivel = parseFloat(prompt('Digite o valor de sua transferência: '));

			if (isNaN(numTransfer) || numTransfer === '' || numTransfer <= 0) {
				alert('Por favor, informe um número: ');
				fazer_transferencia();

				}else if (isNaN(saldoDisponivel) || saldoDisponivel === '' || saldoDisponivel <= 0) {
				alert('Por favor, informe um número: ');
				fazer_transferencia();

				} else if (saldoDisponivel > saldo) {
				alert('Operação não autorizada.')

				}else {
				saldo -= saldoDisponivel;
				extratoLista.push("Transferência: R$ " + saldoDisponivel.toFixed(2));
					
				alert('O valor de ' + saldoDisponivel + ' foi transferido.')
				alert('Seu valor atual é de R$' + saldo);
				inicio();
				}


			
		}
		
		function erro() {
			alert('Por favor, informe um número entre 1 a 6');
			inicio();
		}

		function sair() {
			var confirma = confirm('Você deseja sair?');
			alert('Obrigado por usar nosso serviço do Caixa Eletrônico. Volte sempre!');
			if (confirma) {
				window.close();
			} else {
				inicio();
			}
		}

		function senha() {
			var senhaInput = parseInt(prompt('Digite sua senha: '));

			if (senhaInput === senhaUsuario){
			alert("Acesso Permitido.")
			} else {
			alert("Acesso Negado. Tente novamente.");
			senha();
			}
		}
		
		apresentacao();
	</script>
</head>

</body>

</html>
